<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAFPLAN — Planning des soins</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 20px 44px;
        }

        header {
            background-color: #FF6B00;
            color: white;
            padding: 24px 30px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }

        header h1 { font-size: 2.2rem; margin-bottom: 6px; }
        header p  { font-size: 1rem; opacity: 0.95; }

        .form-section {
            background: white;
            padding: 22px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 18px; }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 7px;
            color: #1a1a1a;
        }

        input[type="file"],
        input[type="time"] {
            width: 100%;
            padding: 11px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }

        input[type="file"]:focus,
        input[type="time"]:focus { outline: none; border-color: #FF6B00; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            padding: 13px 26px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-primary { background-color: #FF6B00; color: white; flex: 1; }
        .btn-primary:hover:not(:disabled) {
            background-color: #E55A00;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }
        .btn-primary:disabled { background-color: #FFBB80; cursor: not-allowed; }

        .btn-secondary { background-color: #f0f0f0; color: #333; }
        .btn-secondary:hover { background-color: #e0e0e0; }

        /* ─── Sélecteur d'étage ─── */
        .floor-group {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }
        .floor-btn {
            flex: 1;
            padding: 9px 10px;
            border: 2px solid #FF6B00;
            border-radius: 22px;
            background: white;
            color: #FF6B00;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            letter-spacing: 0.3px;
        }
        .floor-btn:hover:not(.active) { background: #FFF3E0; }
        .floor-btn.active { background: #FF6B00; color: white; }

        .loading { display: none; text-align: center; padding: 30px; }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF6B00;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

        .results-section {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 2px solid #FF6B00;
        }

        .results-header h2 { color: #FF6B00; }

        .badge {
            background-color: #FF6B00;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .patient-card {
            background-color: #FFF8F3;
            border-left: 4px solid #FF6B00;
            padding: 18px 20px;
            margin-bottom: 18px;
            border-radius: 6px;
        }

        .patient-header {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .soin-item {
            display: flex;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid #FFE0B2;
        }
        .soin-item:last-child { border-bottom: none; }

        .soin-date {
            display: inline-block;
            color: #999;
            font-size: 0.76rem;
            margin-left: 7px;
        }

        .soin-heure {
            font-weight: 700;
            color: #FF6B00;
            white-space: nowrap;
            min-width: 50px;
        }

        .soin-category {
            display: inline-block;
            background-color: #FFF3E0;
            color: #FF6B00;
            font-size: 0.73rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 8px;
            margin-right: 7px;
        }

        .soin-description { flex: 1; }

        .btn-export { background-color: #4CAF50; color: white; }
        .btn-export:hover { background-color: #45a049; }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        /* ═══════════════════════════════════════════════════
           SIDEBAR FILTRES — panneau latéral rétractable
           ═══════════════════════════════════════════════════ */

        .filter-sidebar {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            align-items: stretch;
        }

        /* L'onglet toujours visible */
        .filter-tab {
            background: #FF6B00;
            color: white;
            width: 26px;
            padding: 28px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
            user-select: none;
            transition: background 0.2s, width 0.3s, border-radius 0.3s;
        }

        .filter-tab:hover { background: #E55A00; }

        .filter-sidebar.open .filter-tab {
            background: #CC5200;
            border-radius: 0;
            box-shadow: none;
        }

        .filter-tab-arrow {
            font-size: 0.6rem;
            transition: transform 0.3s;
        }

        .filter-sidebar.open .filter-tab-arrow {
            transform: rotate(180deg);
        }

        .filter-tab-label {
            writing-mode: vertical-lr;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
        }

        .filter-count-badge {
            background: white;
            color: #FF6B00;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 0.6rem;
            font-weight: 900;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* Le panneau qui se déploie */
        .filter-panel {
            width: 0;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
        }

        .filter-sidebar.open .filter-panel {
            width: 265px;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        }

        .filter-panel-inner {
            width: 265px;
            padding: 16px;
            max-height: 88vh;
            overflow-y: auto;
        }

        /* Scrollbar discrète */
        .filter-panel-inner::-webkit-scrollbar { width: 4px; }
        .filter-panel-inner::-webkit-scrollbar-track { background: #f1f1f1; }
        .filter-panel-inner::-webkit-scrollbar-thumb { background: #FFBB80; border-radius: 2px; }

        .filter-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 2px solid #FF6B00;
        }

        .filter-panel-header h3 { color: #FF6B00; font-size: 0.95rem; }

        .filter-shortcut-group { display: flex; gap: 5px; }

        .filter-shortcut-btn {
            padding: 3px 8px;
            font-size: 0.7rem;
            border: 1px solid #FF6B00;
            border-radius: 4px;
            cursor: pointer;
            background: transparent;
            color: #FF6B00;
            font-weight: 600;
            transition: all 0.15s;
        }
        .filter-shortcut-btn:hover { background: #FF6B00; color: white; }

        .filter-separator {
            border: none;
            border-top: 1px dashed #FFD0A0;
            margin: 8px 0;
        }

        .filter-group-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin: 10px 0 4px 6px;
        }

        .categories-grid {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: normal;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 5px 6px;
            border-radius: 5px;
            transition: background 0.12s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .checkbox-label:hover { background: #FFF3E0; }

        .checkbox-label input[type="checkbox"] {
            margin-right: 8px;
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #FF6B00;
            flex-shrink: 0;
        }

        /* ═══════════════════════════════════════════════════ */

        @media (max-width: 768px) {
            header h1 { font-size: 1.7rem; }
            .form-row { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            .container { padding-left: 38px; }
        }
    </style>
</head>
<body>

    <!-- ═══ SIDEBAR FILTRES ═══ -->
    <div class="filter-sidebar" id="filterSidebar">
        <div class="filter-tab" id="filterTab">
            <span class="filter-tab-arrow">▶</span>
            <span class="filter-tab-label">FILTRES</span>
            <span class="filter-count-badge" id="filterCountBadge"></span>
        </div>
        <div class="filter-panel">
            <div class="filter-panel-inner">
                <div class="filter-panel-header">
                    <h3>🏷️ Catégories</h3>
                    <div class="filter-shortcut-group">
                        <button class="filter-shortcut-btn" id="selectAllBtn">Tout</button>
                        <button class="filter-shortcut-btn" id="deselectAllBtn">Aucun</button>
                    </div>
                </div>
                <div class="categories-grid" id="categoriesGrid"></div>
            </div>
        </div>
    </div>

    <!-- ═══ CONTENU PRINCIPAL ═══ -->
    <div class="container">
        <header>
            <h1>🏥 TAFPLAN</h1>
            <p>Planning des soins EHPAD — Analyse par tranche horaire</p>
        </header>

        <div class="form-section">
            <form id="analysisForm">
                <div class="form-group">
                    <label for="pdfFile">📄 Importer le planning PDF</label>
                    <input type="file" id="pdfFile" name="file" accept=".pdf" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="heureDebut">🕐 Heure de début</label>
                        <input type="time" id="heureDebut" name="heure_debut" value="14:00" required>
                    </div>
                    <div class="form-group">
                        <label for="heureFin">🕐 Heure de fin</label>
                        <input type="time" id="heureFin" name="heure_fin" value="20:00" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top:6px;">
                    <label>🏢 Étage</label>
                    <div class="floor-group">
                        <button type="button" class="floor-btn active" data-floor="all">Tout</button>
                        <button type="button" class="floor-btn" data-floor="rdc">RDC &nbsp;<small style="font-weight:400;opacity:.75;">(ch. 1–32)</small></button>
                        <button type="button" class="floor-btn" data-floor="1er">1ER ÉTAGE &nbsp;<small style="font-weight:400;opacity:.75;">(ch. 101–132)</small></button>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-primary" id="analyzeBtn">🔍 Analyser</button>
                    <button type="reset" class="btn-secondary">↻ Réinitialiser</button>
                </div>
            </form>
        </div>

        <div class="error" id="errorMsg"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyse en cours…</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>Résultats</h2>
                <div>
                    <span class="badge" id="resultCount">0 soin(s)</span>
                    <button type="button" class="btn-export" id="exportBtn" style="margin-left: 12px;">⬇️ Télécharger PDF</button>
                </div>
            </div>
            <div id="resultsContent"></div>
        </div>

        <div class="results-section" id="residentSection" style="display:none; background-color:#F9F9F9; border-left:5px solid #FF6B00;">
            <div class="results-header">
                <h2>👤 Prescriptions par résident</h2>
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label for="residentSelect">Choisir un résident</label>
                <select id="residentSelect" style="width:100%;padding:11px;border:2px solid #ddd;border-radius:6px;font-size:1rem;">
                    <option value="">-- Sélectionner --</option>
                </select>
            </div>
            <div id="residentContent"></div>
        </div>
    </div>

    <script>
        const categories = {{ categories | tojson }};

        // Catégories médicament pour séparateur visuel
        const MED_CATS = new Set([
            'Antalgiques', 'Compléments alimentaires', 'Perfusion / IV',
            'Psychotropes', 'Traitements anticoagulants', 'Traitements cardiaques',
            'Traitements diabétiques', 'Traitements diurétiques', 'Traitements si besoin',
            'Injection / SC', 'Collyre'
        ]);

        // ── Génération des checkboxes dans la sidebar ──────────────────────────
        const grid = document.getElementById('categoriesGrid');
        let lastWasMed = null;

        categories.forEach(cat => {
            const isMed = MED_CATS.has(cat);

            // Séparateur entre actes de soins et médicaments/traitements
            if (lastWasMed === false && isMed) {
                const sep = document.createElement('hr');
                sep.className = 'filter-separator';
                grid.appendChild(sep);

                const lbl = document.createElement('div');
                lbl.className = 'filter-group-label';
                lbl.textContent = 'Médicaments & Traitements';
                grid.appendChild(lbl);
            } else if (lastWasMed === null && !isMed) {
                const lbl = document.createElement('div');
                lbl.className = 'filter-group-label';
                lbl.textContent = 'Actes de soins';
                grid.appendChild(lbl);
            }

            lastWasMed = isMed;

            const label = document.createElement('label');
            label.className = 'checkbox-label';
            label.innerHTML = `<input type="checkbox" name="categories" value="${cat}"><span>${cat}</span>`;
            grid.appendChild(label);
        });

        // ── Sidebar hover / clic ───────────────────────────────────────────────
        const sidebar = document.getElementById('filterSidebar');
        const filterTab = document.getElementById('filterTab');
        let closeTimeout;

        sidebar.addEventListener('mouseenter', () => {
            clearTimeout(closeTimeout);
            sidebar.classList.add('open');
        });

        sidebar.addEventListener('mouseleave', () => {
            closeTimeout = setTimeout(() => sidebar.classList.remove('open'), 350);
        });

        // Clic sur l'onglet = épingler/dépingler
        filterTab.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            clearTimeout(closeTimeout);
        });

        // Tout / Aucun
        document.getElementById('selectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('#categoriesGrid input[type="checkbox"]').forEach(cb => cb.checked = true);
            applyFilters();
        });

        document.getElementById('deselectAllBtn').addEventListener('click', () => {
            document.querySelectorAll('#categoriesGrid input[type="checkbox"]').forEach(cb => cb.checked = false);
            applyFilters();
        });

        function updateFilterBadge() {
            const count = document.querySelectorAll('#categoriesGrid input[type="checkbox"]:checked').length;
            const badge = document.getElementById('filterCountBadge');
            if (count > 0 && count < categories.length) {
                badge.textContent = count;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        }

        // ── Sélecteur d'étage ─────────────────────────────────────────────────
        let currentFloor = 'all';

        function getFloor(room) {
            const num = parseInt((room || '').replace(/^[A-Za-z]+/, ''));
            if (isNaN(num)) return null;
            if (num >= 1   && num <= 32)  return 'rdc';
            if (num >= 101 && num <= 132) return '1er';
            return null;
        }

        document.querySelectorAll('.floor-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.floor-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFloor = btn.dataset.floor;
                applyFilters();
            });
        });

        // ── Données ────────────────────────────────────────────────────────────
        let allSoins = [];
        let currentHeureDebut = '';
        let currentHeureFin = '';

        // ── Filtrage côté client ───────────────────────────────────────────────
        function applyFilters() {
            if (!allSoins.length) return;

            const selected = [];
            document.querySelectorAll('input[name="categories"]:checked').forEach(cb => selected.push(cb.value));

            let filtered = selected.length > 0
                ? allSoins.filter(s => selected.includes(s.category))
                : allSoins.slice();

            // Filtre par étage
            if (currentFloor !== 'all') {
                filtered = filtered.filter(s => getFloor(s.room) === currentFloor);
            }

            // Grouper par patient
            const patientMap = {};
            const patientOrder = [];
            filtered.forEach(s => {
                const key = s.resident || 'Résident inconnu';
                if (!patientMap[key]) { patientMap[key] = { room: s.room || '', soins: [] }; patientOrder.push(key); }
                patientMap[key].soins.push(s);
            });

            const getLastName = name => name.replace(/^(Mme\/M\.|Mme|M\.)\s*/i, '').trim().split(' ').pop().toLowerCase();
            const getRoomNum  = room  => parseInt((room || '').replace(/^[A-Za-z]+/, '')) || 9999;

            const patients = patientOrder
                .map(k => ({ resident: k, room: patientMap[k].room, soins: patientMap[k].soins }))
                .sort((a, b) => {
                    if (currentFloor !== 'all') {
                        // Tri par numéro de chambre croissant
                        return getRoomNum(a.room) - getRoomNum(b.room);
                    }
                    // Tri alphabétique par nom de famille
                    return getLastName(a.resident).localeCompare(getLastName(b.resident), 'fr');
                });

            displayResults(filtered.length, patients);
            updateResidentDropdown();
            updateFilterBadge();

            const floorLabels = { all: 'Tous les étages', rdc: 'RDC (chambres 1–32)', '1er': '1er Étage (chambres 101–132)' };
            window.exportData = {
                soins: filtered,
                heure_debut: currentHeureDebut,
                heure_fin: currentHeureFin,
                floor_label: floorLabels[currentFloor] || 'Tous les étages',
            };
        }

        // Re-filtrer à chaque changement de checkbox
        document.getElementById('categoriesGrid').addEventListener('change', applyFilters);

        // ── Soumission du formulaire ───────────────────────────────────────────
        document.getElementById('analysisForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const h_d = parseInt(document.getElementById('heureDebut').value.split(':')[0]);
            const h_f = parseInt(document.getElementById('heureFin').value.split(':')[0]);
            if (h_d >= h_f) { showError("L'heure de fin doit être après l'heure de début"); return; }

            const formData = new FormData(document.getElementById('analysisForm'));
            showLoading(true);
            hideError();

            try {
                const response = await fetch('/api/analyze', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.success) {
                    allSoins = data.soins;
                    currentHeureDebut = data.heure_debut;
                    currentHeureFin = data.heure_fin;
                    applyFilters();
                } else {
                    showError(data.error || "Erreur lors de l'analyse");
                }
            } catch (err) {
                showError('Erreur : ' + err.message);
            } finally {
                showLoading(false);
            }
        });

        // ── Affichage des résultats ────────────────────────────────────────────
        function displayResults(total, patients) {
            const content = document.getElementById('resultsContent');
            content.innerHTML = '';
            document.getElementById('resultCount').textContent = `${total} soin(s)`;

            patients.forEach(patient => {
                const card = document.createElement('div');
                card.className = 'patient-card';
                const room_str = patient.room ? `🚪 Ch. ${patient.room} &nbsp;|&nbsp; ` : '';
                card.innerHTML = `<div class="patient-header">${room_str}👤 <strong>${patient.resident}</strong></div>`;

                const soinsDiv = document.createElement('div');
                patient.soins.forEach(soin => {
                    const heure = soin.heure ? soin.heure.replace(':', 'h') : '—';
                    const cat = soin.category || '';
                    const catBadge = cat ? `<span class="soin-category">${cat}</span>` : '';
                    const dateStr = soin.date_debut ? `<span class="soin-date">depuis ${soin.date_debut}</span>` : '';
                    const item = document.createElement('div');
                    item.className = 'soin-item';
                    item.innerHTML = `<span class="soin-heure">🕐 ${heure}</span><span class="soin-description">${catBadge}${soin.description}${dateStr}</span>`;
                    soinsDiv.appendChild(item);
                });

                card.appendChild(soinsDiv);
                content.appendChild(card);
            });

            document.getElementById('resultsSection').style.display = 'block';
        }

        // ── Export PDF ────────────────────────────────────────────────────────
        document.getElementById('exportBtn').addEventListener('click', async () => {
            const data = window.exportData;
            if (!data) return;
            try {
                const response = await fetch('/api/export-pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `planning_soins_${data.heure_debut.replace(':', 'h')}_${data.heure_fin.replace(':', 'h')}.pdf`;
                    a.click();
                }
            } catch (err) {
                showError('Erreur lors du téléchargement : ' + err.message);
            }
        });

        // ── Vue par résident ──────────────────────────────────────────────────
        function toLastFirst(name) {
            const clean = name.replace(/^(Mme\/M\.|Mme|M\.)\s*/i, '').trim();
            const parts = clean.split(' ');
            const last = parts.pop().toUpperCase();
            return `${last} ${parts.join(' ')}`.trim();
        }

        function updateResidentDropdown() {
            const select = document.getElementById('residentSelect');
            const prev = select.value;
            select.innerHTML = '<option value="">-- Sélectionner --</option>';
            const residents = [...new Set(allSoins.map(s => s.resident))];
            residents
                .map(r => ({ original: r, display: toLastFirst(r) }))
                .sort((a, b) => a.display.localeCompare(b.display, 'fr'))
                .forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.original;
                    opt.textContent = r.display;
                    select.appendChild(opt);
                });
            select.value = prev;
            document.getElementById('residentSection').style.display = allSoins.length ? 'block' : 'none';
        }

        document.getElementById('residentSelect').addEventListener('change', function () {
            const selected = this.value;
            const content = document.getElementById('residentContent');
            content.innerHTML = '';
            if (!selected) return;

            const soins = allSoins.filter(s => s.resident === selected);
            if (!soins.length) { content.innerHTML = '<p>Aucune prescription trouvée.</p>'; return; }

            const catMap = {};
            soins.forEach(s => {
                const cat = s.category || 'Autres';
                if (!catMap[cat]) catMap[cat] = [];
                catMap[cat].push(s);
            });

            Object.entries(catMap).sort(([a], [b]) => a.localeCompare(b, 'fr')).forEach(([cat, items]) => {
                const section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = `<h4 style="color:#FF6B00;margin-bottom:8px;border-bottom:1px solid #FFE0B2;padding-bottom:4px;">${cat}</h4>`;
                items.forEach(soin => {
                    const heure = soin.heure ? soin.heure.replace(':', 'h') : '—';
                    const dateStr = soin.date_debut ? ` <span style="color:#999;font-size:0.76rem;">depuis ${soin.date_debut}</span>` : '';
                    const div = document.createElement('div');
                    div.className = 'soin-item';
                    div.innerHTML = `<span class="soin-heure">🕐 ${heure}</span><span class="soin-description">${soin.description}${dateStr}</span>`;
                    section.appendChild(div);
                });
                content.appendChild(section);
            });
        });

        // ── Utilitaires ───────────────────────────────────────────────────────
        function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
        function showError(msg)    { const e = document.getElementById('errorMsg'); e.textContent = msg; e.style.display = 'block'; }
        function hideError()       { document.getElementById('errorMsg').style.display = 'none'; }
    </script>
</body>
</html>
